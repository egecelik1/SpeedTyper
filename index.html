<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="timer-container">
       <span> Time left: <span id="timer" >60</span> s </span>
    </div>

    <div id="main-h">
    <h2 id="main-title">Most Popular 500 English Words:</h2>
    <div class="settings">
        <select id="language-select">
            <option value="en">English</option>
            <option value="tr">Turkish</option>
            <option value="de">German</option>
        </select>
    </div>
</div>


    <div id="word-pool">

    </div>

    <div class="input-area">
        <input type="text" id="word-input" autocomplete="off" autofocus placeholder="start writing...">
        <button id="restart-btn" title="Restart">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
    </div>

    <div class="score-sidebar">
        <h3>Score:</h3>
        <div id="last-score">0 WPM</div>
        
        <h3>Last Score:</h3>
        <div id="last-result">-</div>
    </div>



    <script src="javascript/script.js"></script>
</body>
</html>
